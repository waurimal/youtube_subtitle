<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 커스텀 자막 플레이어</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 자막이 표시될 오버레이 스타일 */
        #subtitle-overlay {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            pointer-events: none; /* 자막을 클릭해도 영상이 클릭되도록 함 */
            z-index: 10;
        }
        
        .subtitle-text {
            display: inline-block;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 1.5rem;
            padding: 4px 12px;
            border-radius: 4px;
            text-shadow: 1px 1px 2px black;
            line-height: 1.4;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
        }
        
        /* iframe 컨테이너 비율 유지 (16:9) */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background-color: #000;
            border-radius: 0.5rem;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-6 font-sans">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">유튜브 로컬 자막 플레이어</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <!-- 유튜브 URL 입력 -->
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">유튜브 영상 링크</label>
                <div class="flex gap-2">
                    <input type="text" id="youtube-url" placeholder="https://www.youtube.com/watch?v=..." 
                           class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <button onclick="loadVideo()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">영상 불러오기</button>
                </div>
            </div>

            <!-- 자막 파일 업로드 -->
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">자막 파일 (.srt)</label>
                <input type="file" id="subtitle-file" accept=".srt" 
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
        </div>

        <!-- 플레이어 영역 -->
        <div class="video-container shadow-inner">
            <div id="player"></div>
            <div id="subtitle-overlay">
                <span id="subtitle-display" class="subtitle-text" style="display: none;"></span>
            </div>
        </div>
        
        <div class="mt-4 text-sm text-gray-500">
            * 자막 파일(.srt)을 선택하고 영상을 재생하면 설정된 시간에 맞게 자막이 표시됩니다.
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let subtitles = [];
        let syncInterval;

        // 1. YouTube IFrame API 준비 완료 시 호출됨
        function onYouTubeIframeAPIReady() {
            // 초기 플레이어 생성 (기본 영상: 빈 화면 대신 임시 영상 ID 넣거나 비워둠)
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: '', 
                playerVars: {
                    'playsinline': 1,
                    'controls': 1,
                    'rel': 0
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // 2. 영상 로드하기
        function loadVideo() {
            const url = document.getElementById('youtube-url').value;
            const videoId = extractVideoID(url);
            
            if (videoId) {
                player.loadVideoById(videoId);
            } else {
                alert('올바른 유튜브 링크를 입력해주세요.');
            }
        }

        // 유튜브 URL에서 Video ID 추출하는 함수
        function extractVideoID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }

        // 3. 자막 파일 처리
        document.getElementById('subtitle-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const srtText = event.target.result;
                subtitles = parseSRT(srtText);
                alert('자막이 성공적으로 로드되었습니다. (' + subtitles.length + '줄)');
            };
            reader.readAsText(file, 'utf-8'); // 한글 인코딩 깨지면 'euc-kr' 등 변경 가능
        });

        // SRT 파싱 함수 (텍스트를 [시작시간, 종료시간, 텍스트] 배열로 변환)
        function parseSRT(data) {
            const regex = /(\d+)\s+(\d{2}:\d{2}:\d{2}[,.]\d{3})\s+-->\s+(\d{2}:\d{2}:\d{2}[,.]\d{3})\s+([\s\S]*?(?=\n{2,}|$))/g;
            let match;
            const subs = [];
            
            while ((match = regex.exec(data)) !== null) {
                subs.push({
                    start: timeToSeconds(match[2]),
                    end: timeToSeconds(match[3]),
                    // 줄바꿈 문자를 <br> 태그로 변환
                    text: match[4].trim().replace(/\n/g, '<br>')
                });
            }
            return subs;
        }

        // 'HH:MM:SS,ms' 형식을 초 단위 숫자(float)로 변환
        function timeToSeconds(timeStr) {
            const parts = timeStr.replace(',', '.').split(':');
            return parseFloat(parts[0]) * 3600 + parseFloat(parts[1]) * 60 + parseFloat(parts[2]);
        }

        // 4. 영상 상태 변경 시 자막 동기화
        function onPlayerStateChange(event) {
            // 재생 중일 때 (YT.PlayerState.PLAYING == 1)
            if (event.data == YT.PlayerState.PLAYING) {
                startSubtitleSync();
            } else {
                stopSubtitleSync();
            }
        }

        function startSubtitleSync() {
            // 0.1초마다 영상 시간 확인하여 자막 업데이트
            syncInterval = setInterval(() => {
                const currentTime = player.getCurrentTime();
                updateSubtitleDisplay(currentTime);
            }, 100);
        }

        function stopSubtitleSync() {
            clearInterval(syncInterval);
        }

        function updateSubtitleDisplay(currentTime) {
            const displayElement = document.getElementById('subtitle-display');
            
            // 현재 시간에 맞는 자막 찾기
            const currentSub = subtitles.find(sub => currentTime >= sub.start && currentTime <= sub.end);

            if (currentSub) {
                displayElement.innerHTML = currentSub.text;
                displayElement.style.display = 'inline-block';
            } else {
                displayElement.style.display = 'none';
                displayElement.innerHTML = '';
            }
        }
    </script>
</body>
</html>
