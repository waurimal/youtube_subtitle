<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 커스텀 자막 플레이어</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 자막이 표시될 오버레이 스타일 */
        #subtitle-overlay {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            pointer-events: none; /* 자막을 클릭해도 영상이 클릭되도록 함 */
            z-index: 10;
        }
        
        .subtitle-text {
            display: inline-block;
            background-color: rgba(0, 0, 0, 0.75);
            color: white;
            font-size: 1.5rem;
            padding: 6px 16px;
            border-radius: 6px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            line-height: 1.4;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            transition: font-size 0.2s;
        }
        
        /* iframe 컨테이너 비율 유지 (16:9) */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background-color: #000;
            border-radius: 0.5rem;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* --- 전체화면(Fullscreen) 모드일 때의 스타일 --- */
        .video-container:fullscreen {
            padding-bottom: 0;
            height: 100vh;
            border-radius: 0;
        }
        .video-container:fullscreen .subtitle-text {
            font-size: 2.5rem; /* 전체화면 시 자막 크기 키움 */
            padding: 10px 24px;
        }
        
        /* 사파리 등 Webkit 브라우저 호환성 */
        .video-container:-webkit-full-screen {
            padding-bottom: 0;
            height: 100vh;
            border-radius: 0;
        }
        .video-container:-webkit-full-screen .subtitle-text {
            font-size: 2.5rem;
            padding: 10px 24px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-6 font-sans">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">유튜브 로컬 자막 플레이어</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <!-- 유튜브 URL 입력 -->
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">유튜브 영상 링크</label>
                <div class="flex gap-2">
                    <input type="text" id="youtube-url" placeholder="https://www.youtube.com/watch?v=..." 
                           class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <button onclick="loadVideo()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">영상 불러오기</button>
                </div>
            </div>

            <!-- 자막 파일 업로드 -->
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">자막 파일 (.srt)</label>
                <input type="file" id="subtitle-file" accept=".srt" 
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
        </div>

        <!-- 플레이어 영역 -->
        <div id="video-container" class="video-container shadow-inner">
            <div id="player"></div>
            <div id="subtitle-overlay">
                <span id="subtitle-display" class="subtitle-text" style="display: none;"></span>
            </div>
        </div>
        
        <!-- 하단 컨트롤 및 안내 문구 -->
        <div class="mt-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div class="text-sm text-gray-500 space-y-1">
                <p>* 자막 파일(.srt)을 선택하고 영상을 재생하면 자막이 표시됩니다.</p>
                <p class="text-red-500 font-medium">* 자막과 함께 보려면 유튜브 기본 버튼 대신 우측의 전체화면 버튼을 사용하세요.</p>
            </div>
            
            <button onclick="toggleFullScreen()" class="flex items-center gap-2 px-5 py-2.5 bg-gray-800 text-white font-semibold rounded-lg hover:bg-gray-900 transition shrink-0 shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                </svg>
                전체화면 모드
            </button>
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let subtitles = [];
        let syncInterval;

        // 1. YouTube IFrame API 준비 완료 시 호출됨
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: '', 
                playerVars: {
                    'playsinline': 1,
                    'controls': 1,
                    'rel': 0,
                    'fs': 0 // 유튜브 플레이어 내부의 기본 전체화면 버튼 숨김 (중요)
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // 2. 영상 로드하기
        function loadVideo() {
            const url = document.getElementById('youtube-url').value;
            const videoId = extractVideoID(url);
            
            if (videoId) {
                player.loadVideoById(videoId);
            } else {
                alert('올바른 유튜브 링크를 입력해주세요.');
            }
        }

        function extractVideoID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }

        // 3. 자막 파일 처리
        document.getElementById('subtitle-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const srtText = event.target.result;
                subtitles = parseSRT(srtText);
                alert('자막이 성공적으로 로드되었습니다. (' + subtitles.length + '줄)');
            };
            reader.readAsText(file, 'utf-8');
        });

        // SRT 파싱 함수
        function parseSRT(data) {
            const normalizedData = data.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const blocks = normalizedData.trim().split(/\n{2,}/);
            const subs = [];
            
            blocks.forEach(block => {
                const lines = block.split('\n');
                if (lines.length >= 3) {
                    let timeLineIndex = -1;
                    let timeMatch = null;
                    
                    for (let i = 0; i < lines.length; i++) {
                        timeMatch = lines[i].match(/(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})/);
                        if (timeMatch) {
                            timeLineIndex = i;
                            break;
                        }
                    }
                    
                    if (timeMatch && timeLineIndex !== -1) {
                        const text = lines.slice(timeLineIndex + 1).join('<br>');
                        subs.push({
                            start: timeToSeconds(timeMatch[1]),
                            end: timeToSeconds(timeMatch[2]),
                            text: text
                        });
                    }
                }
            });
            return subs;
        }

        function timeToSeconds(timeStr) {
            const parts = timeStr.replace(',', '.').split(':');
            return parseFloat(parts[0]) * 3600 + parseFloat(parts[1]) * 60 + parseFloat(parts[2]);
        }

        // 4. 영상 상태 변경 시 자막 동기화
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                startSubtitleSync();
            } else {
                stopSubtitleSync();
            }
        }

        function startSubtitleSync() {
            syncInterval = setInterval(() => {
                const currentTime = player.getCurrentTime();
                updateSubtitleDisplay(currentTime);
            }, 100);
        }

        function stopSubtitleSync() {
            clearInterval(syncInterval);
        }

        function updateSubtitleDisplay(currentTime) {
            const displayElement = document.getElementById('subtitle-display');
            const currentSub = subtitles.find(sub => currentTime >= sub.start && currentTime <= sub.end);

            if (currentSub) {
                displayElement.innerHTML = currentSub.text;
                displayElement.style.display = 'inline-block';
            } else {
                displayElement.style.display = 'none';
                displayElement.innerHTML = '';
            }
        }

        // 5. 커스텀 전체화면 제어 함수
        function toggleFullScreen() {
            const container = document.getElementById('video-container');
            
            // 현재 전체화면이 아닌 경우 -> 전체화면 요청
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (container.requestFullscreen) {
                    container.requestFullscreen();
                } else if (container.webkitRequestFullscreen) { /* Safari 지원 */
                    container.webkitRequestFullscreen();
                }
            } 
            // 현재 전체화면인 경우 -> 전체화면 종료 (ESC 키로도 종료됨)
            else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari 지원 */
                    document.webkitExitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
