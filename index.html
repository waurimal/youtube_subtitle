<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유튜브 커스텀 자막 플레이어</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 자막이 표시될 오버레이 스타일 */
        #subtitle-overlay {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            pointer-events: none; /* 자막을 클릭해도 영상이 클릭되도록 함 */
            z-index: 10;
        }
        
        .subtitle-text {
            display: inline-block;
            background-color: rgba(0, 0, 0, 0.75);
            color: white;
            font-size: 1.5rem;
            padding: 6px 16px;
            border-radius: 6px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            line-height: 1.4;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            transition: font-size 0.2s;
        }
        
        /* iframe 컨테이너 비율 유지 (16:9) */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background-color: #000;
            border-radius: 0.5rem;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* --- 전체화면(Fullscreen) 모드일 때의 스타일 --- */
        .video-container:fullscreen {
            padding-bottom: 0;
            height: 100vh;
            border-radius: 0;
        }
        .video-container:fullscreen .subtitle-text {
            font-size: 2.5rem; /* 전체화면 시 자막 크기 키움 */
            padding: 10px 24px;
        }
        
        /* 사파리 등 Webkit 브라우저 호환성 */
        .video-container:-webkit-full-screen {
            padding-bottom: 0;
            height: 100vh;
            border-radius: 0;
        }
        .video-container:-webkit-full-screen .subtitle-text {
            font-size: 2.5rem;
            padding: 10px 24px;
        }

        /* 스크롤바 커스텀 (검색 결과) */
        .custom-scrollbar::-webkit-scrollbar {
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 sm:p-6 font-sans">

    <div class="max-w-5xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold mb-6 text-gray-800 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="#ef4444" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"></path><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02" fill="white"></polygon></svg>
            유튜브 로컬 자막 플레이어
        </h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-6">
            <!-- 1. 영상 선택 영역 (링크 or 검색) -->
            <div class="space-y-5 bg-gray-50 p-5 rounded-lg border border-gray-100">
                <h2 class="text-lg font-semibold text-gray-700 mb-2">1. 영상 가져오기</h2>
                
                <!-- 기존 URL 입력 방식 -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-600">직접 링크 입력</label>
                    <div class="flex gap-2">
                        <input type="text" id="youtube-url" placeholder="https://www.youtube.com/watch?v=..." 
                               class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                        <button onclick="loadVideo()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition font-medium whitespace-nowrap">불러오기</button>
                    </div>
                </div>

                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-gray-200"></div>
                    <span class="flex-shrink-0 mx-4 text-gray-400 text-xs font-medium">또는 무료 검색</span>
                    <div class="flex-grow border-t border-gray-200"></div>
                </div>

                <!-- 새로운 검색 방식 (API 키 제거됨) -->
                <div class="space-y-2">
                    <div class="flex gap-2">
                        <input type="text" id="search-query" onkeypress="if(event.key === 'Enter') searchYouTube()" placeholder="검색어를 입력하세요 (키 불필요)" 
                               class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-gray-800 focus:border-gray-800 outline-none transition">
                        <button onclick="searchYouTube()" class="px-4 py-2 bg-gray-800 text-white rounded-lg hover:bg-gray-900 transition font-medium flex items-center gap-2 whitespace-nowrap">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            검색
                        </button>
                    </div>
                </div>
            </div>

            <!-- 2. 자막 파일 업로드 영역 -->
            <div class="bg-gray-50 p-5 rounded-lg border border-gray-100 flex flex-col justify-center">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">2. 자막 파일 선택 (.srt)</h2>
                <div class="relative border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:bg-gray-100 transition cursor-pointer" onclick="document.getElementById('subtitle-file').click()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mx-auto text-gray-400 mb-2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <p class="text-sm font-medium text-blue-600">파일 찾아보기</p>
                    <p class="text-xs text-gray-500 mt-1" id="file-name-display">클릭하여 .srt 파일을 업로드하세요</p>
                    <input type="file" id="subtitle-file" accept=".srt" class="hidden" onchange="handleSubtitleUpload(event)">
                </div>
            </div>
        </div>

        <!-- 검색 결과 영역 (평소엔 숨김) -->
        <div id="search-results-section" class="mb-6 hidden">
            <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center justify-between">
                <span>검색 결과</span>
                <button onclick="document.getElementById('search-results-section').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 text-xs font-normal">닫기 ✕</button>
            </h3>
            <div id="search-results" class="flex gap-4 overflow-x-auto pb-4 custom-scrollbar snap-x">
                <!-- Javascript로 동적 생성됨 -->
            </div>
        </div>

        <!-- 플레이어 영역 -->
        <div id="video-container" class="video-container shadow-inner">
            <div id="player"></div>
            <div id="subtitle-overlay">
                <span id="subtitle-display" class="subtitle-text" style="display: none;"></span>
            </div>
        </div>
        
        <!-- 하단 컨트롤 및 안내 문구 -->
        <div class="mt-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div class="text-sm text-gray-500 space-y-1">
                <p>* 자막 파일(.srt)을 선택하고 영상을 재생하면 자막이 표시됩니다.</p>
                <p class="text-red-500 font-medium">* 자막과 함께 보려면 유튜브 기본 버튼 대신 우측의 전체화면 버튼을 사용하세요.</p>
            </div>
            
            <button onclick="toggleFullScreen()" class="flex items-center gap-2 px-5 py-2.5 bg-gray-800 text-white font-semibold rounded-lg hover:bg-gray-900 transition shrink-0 shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                </svg>
                전체화면 모드
            </button>
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let subtitles = [];
        let syncInterval;

        // 1. YouTube IFrame API 준비 완료 시 호출됨
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: '', 
                playerVars: {
                    'playsinline': 1,
                    'controls': 1,
                    'rel': 0,
                    'fs': 0 // 유튜브 플레이어 내부의 기본 전체화면 버튼 숨김 (중요)
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // 2. 영상 로드하기 (직접 URL 입력시)
        function loadVideo() {
            const url = document.getElementById('youtube-url').value;
            const videoId = extractVideoID(url);
            
            if (videoId) {
                player.loadVideoById(videoId);
            } else {
                alert('올바른 유튜브 링크를 입력해주세요.');
            }
        }

        function extractVideoID(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length == 11) ? match[7] : false;
        }

        // 3. 유튜브 영상 검색 기능 (오픈소스 Piped API 활용 - 키 불필요)
        async function searchYouTube() {
            const query = document.getElementById('search-query').value.trim();
            const resultsSection = document.getElementById('search-results-section');
            const resultsContainer = document.getElementById('search-results');

            if (!query) {
                alert("검색어를 입력해주세요.");
                return;
            }

            resultsSection.classList.remove('hidden');
            resultsContainer.innerHTML = '<div class="w-full text-center py-6 text-gray-500 font-medium">영상을 검색 중입니다...</div>';

            try {
                // 구글 공식 API 대신 무료 우회 API인 Piped API를 사용하여 검색 결과를 가져옵니다.
                const response = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=videos`);
                const data = await response.json();

                if (data.error) {
                    throw new Error("API 에러");
                }

                resultsContainer.innerHTML = '';
                
                // 검색된 항목 중 실제 영상(stream)인 것만 8개 추출
                const videos = data.items.filter(item => item.type === 'stream').slice(0, 8);

                if (videos.length === 0) {
                    resultsContainer.innerHTML = '<div class="w-full text-center py-6 text-gray-500">검색 결과가 없습니다.</div>';
                    return;
                }

                // 결과 항목 생성
                videos.forEach(item => {
                    // Piped API는 url을 '/watch?v=아이디' 형태로 줌
                    let videoId = "";
                    if (item.url && item.url.includes('?v=')) {
                        videoId = item.url.split('?v=')[1];
                    } else {
                        return; // 올바르지 않은 데이터 건너뛰기
                    }

                    const title = item.title;
                    const thumbnail = item.thumbnail;
                    const channelTitle = item.uploaderName;

                    // 결과 카드 UI
                    const card = document.createElement('div');
                    card.className = 'flex-shrink-0 w-60 bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm hover:shadow-md cursor-pointer transition snap-start group';
                    
                    // 카드 클릭 이벤트 (영상 로드)
                    card.onclick = () => {
                        document.getElementById('youtube-url').value = `https://www.youtube.com/watch?v=${videoId}`;
                        loadVideo(); // 플레이어에 영상 띄우기
                        document.getElementById('video-container').scrollIntoView({ behavior: 'smooth', block: 'center' });
                    };

                    card.innerHTML = `
                        <div class="relative overflow-hidden">
                            <img src="${thumbnail}" alt="${title}" class="w-full h-32 object-cover group-hover:scale-105 transition duration-300" onerror="this.src='https://via.placeholder.com/320x180?text=No+Image'">
                            <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-20 transition flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="text-white opacity-0 group-hover:opacity-100 transition" width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                        <div class="p-3">
                            <h3 class="text-sm font-semibold text-gray-800 line-clamp-2" title="${title}">${title}</h3>
                            <p class="text-xs text-gray-500 mt-1 truncate">${channelTitle}</p>
                        </div>
                    `;
                    resultsContainer.appendChild(card);
                });

            } catch (error) {
                console.error("Search error:", error);
                resultsContainer.innerHTML = `
                    <div class="w-full text-center py-4 text-red-500">
                        <p class="font-bold mb-1">검색 서버와 연결할 수 없습니다.</p>
                        <p class="text-sm text-gray-500">잠시 후 다시 시도하시거나, 직접 링크를 입력해 주세요.</p>
                    </div>
                `;
            }
        }

        // 4. 자막 파일 처리
        function handleSubtitleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 파일명 표시
            document.getElementById('file-name-display').textContent = file.name;

            const reader = new FileReader();
            reader.onload = function(event) {
                const srtText = event.target.result;
                subtitles = parseSRT(srtText);
                alert(`자막 파일이 로드되었습니다. (총 ${subtitles.length}줄)\n영상을 재생하면 자막이 표시됩니다.`);
            };
            reader.readAsText(file, 'utf-8');
        }

        // SRT 파싱 함수
        function parseSRT(data) {
            const normalizedData = data.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const blocks = normalizedData.trim().split(/\n{2,}/);
            const subs = [];
            
            blocks.forEach(block => {
                const lines = block.split('\n');
                if (lines.length >= 3) {
                    let timeLineIndex = -1;
                    let timeMatch = null;
                    
                    for (let i = 0; i < lines.length; i++) {
                        timeMatch = lines[i].match(/(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})/);
                        if (timeMatch) {
                            timeLineIndex = i;
                            break;
                        }
                    }
                    
                    if (timeMatch && timeLineIndex !== -1) {
                        const text = lines.slice(timeLineIndex + 1).join('<br>');
                        subs.push({
                            start: timeToSeconds(timeMatch[1]),
                            end: timeToSeconds(timeMatch[2]),
                            text: text
                        });
                    }
                }
            });
            return subs;
        }

        function timeToSeconds(timeStr) {
            const parts = timeStr.replace(',', '.').split(':');
            return parseFloat(parts[0]) * 3600 + parseFloat(parts[1]) * 60 + parseFloat(parts[2]);
        }

        // 5. 영상 상태 변경 시 자막 동기화
        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                startSubtitleSync();
            } else {
                stopSubtitleSync();
            }
        }

        function startSubtitleSync() {
            syncInterval = setInterval(() => {
                const currentTime = player.getCurrentTime();
                updateSubtitleDisplay(currentTime);
            }, 100);
        }

        function stopSubtitleSync() {
            clearInterval(syncInterval);
        }

        function updateSubtitleDisplay(currentTime) {
            const displayElement = document.getElementById('subtitle-display');
            const currentSub = subtitles.find(sub => currentTime >= sub.start && currentTime <= sub.end);

            if (currentSub) {
                displayElement.innerHTML = currentSub.text;
                displayElement.style.display = 'inline-block';
            } else {
                displayElement.style.display = 'none';
                displayElement.innerHTML = '';
            }
        }

        // 6. 커스텀 전체화면 제어 함수
        function toggleFullScreen() {
            const container = document.getElementById('video-container');
            
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (container.requestFullscreen) {
                    container.requestFullscreen();
                } else if (container.webkitRequestFullscreen) {
                    container.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
